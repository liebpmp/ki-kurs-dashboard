<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI-Kurs Dashboard — Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-container { background: #141414; border: 1px solid #262626; border-radius: 16px; padding: 48px; max-width: 420px; width: 90%; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo p { color: #737373; font-size: 14px; margin-top: 8px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: #a3a3a3; margin-bottom: 6px; font-weight: 500; }
  input { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 15px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #3b82f6; }
  input::placeholder { color: #525252; }
  .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #3b82f6, #7c3aed); border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: #ef4444; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
  .loading { color: #3b82f6; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
  .footer { text-align: center; margin-top: 24px; color: #525252; font-size: 12px; }
  .logout-bar { position: fixed; top: 0; left: 0; right: 0; height: 40px; background: rgba(10,10,10,0.95); border-bottom: 1px solid #262626; display: none; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 10000; }
  .logout-bar span { color: #737373; font-size: 12px; }
  .logout-bar button { background: transparent; color: #ef4444; border: 1px solid #333; padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }
  .logout-bar button:hover { background: rgba(239,68,68,0.15); }
  #dashboard-wrapper { display: none; position: fixed; top: 40px; left: 0; right: 0; bottom: 0; overflow: auto; background: #fff; }
</style>
</head>
<body>

<div class="login-container" id="loginBox">
  <div class="logo">
    <h1>📊 KI-Kurs Dashboard</h1>
    <p>AES-256 verschlüsselt — Zugang nur mit Berechtigung</p>
  </div>
  <form onsubmit="return doLogin()">
    <div class="form-group">
      <label>E-Mail</label>
      <input type="email" id="email" placeholder="name@company.de" required autocomplete="email">
    </div>
    <div class="form-group">
      <label>Passwort</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="loginBtn">Anmelden</button>
    <div class="error" id="error">Ungültige Zugangsdaten. Bitte versuche es erneut.</div>
    <div class="loading" id="loading">Entschlüssele Dashboard...</div>
  </form>
  <div class="footer">Förderperspektive × Pro Med Performance</div>
</div>

<div class="logout-bar" id="logoutBar">
  <span id="userLabel"></span>
  <button onclick="doLogout()">Logout</button>
</div>
<div id="dashboard-wrapper"></div>

<script>
let PAYLOAD = null;

async function loadPayload() {
  const resp = await fetch('encrypted-payload.json?v=' + Date.now());
  PAYLOAD = await resp.json();
}
loadPayload();

function b64ToBytes(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

async function deriveKey(email, password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(email + ':' + password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode('ki-kurs-salt-2026'), iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

async function decryptMasterKey(email, password) {
  const userInfo = PAYLOAD.users[email];
  if (!userInfo) return null;
  
  const dk = await deriveKey(email, password);
  const wrapped = b64ToBytes(userInfo.wrapped);
  const nonce = b64ToBytes(userInfo.nonce);
  
  try {
    const masterKeyBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, dk, wrapped);
    return new Uint8Array(masterKeyBuf);
  } catch(e) {
    return null;
  }
}

async function decryptDashboard(masterKeyBytes) {
  const key = await crypto.subtle.importKey('raw', masterKeyBytes, 'AES-GCM', false, ['decrypt']);
  const encrypted = b64ToBytes(PAYLOAD.data);
  const nonce = b64ToBytes(PAYLOAD.nonce);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, key, encrypted);
  return new TextDecoder().decode(decrypted);
}

async function doLogin() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pw = document.getElementById('password').value;
  const errEl = document.getElementById('error');
  const loadEl = document.getElementById('loading');
  const btn = document.getElementById('loginBtn');
  
  errEl.style.display = 'none';
  loadEl.style.display = 'block';
  btn.disabled = true;
  
  try {
    if (!PAYLOAD) { await loadPayload(); }
    
    if (!PAYLOAD.users[email]) {
      throw new Error('User not found');
    }
    
    const masterKey = await decryptMasterKey(email, pw);
    if (!masterKey) {
      throw new Error('Wrong password');
    }
    
    const html = await decryptDashboard(masterKey);
    showDashboard(html, email);
  } catch(e) {
    console.error('Login error:', e);
    loadEl.style.display = 'none';
    errEl.style.display = 'block';
    btn.disabled = false;
  }
  return false;
}

function showDashboard(html, email) {
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('logoutBar').style.display = 'flex';
  document.getElementById('userLabel').textContent = '🔒 ' + email;
  
  const wrapper = document.getElementById('dashboard-wrapper');
  wrapper.style.display = 'block';
  
  // Inject dashboard HTML via srcdoc iframe for isolation
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:100%;border:none;';
  iframe.srcdoc = html;
  wrapper.appendChild(iframe);
}

function doLogout() {
  location.reload();
}
</script>

</body>
</html>
