<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI-Kurs Dashboard — Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-container { background: #141414; border: 1px solid #262626; border-radius: 16px; padding: 48px; max-width: 420px; width: 90%; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo p { color: #737373; font-size: 14px; margin-top: 8px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: #a3a3a3; margin-bottom: 6px; font-weight: 500; }
  input { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 15px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #3b82f6; }
  input::placeholder { color: #525252; }
  .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #3b82f6, #7c3aed); border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.9; }
  .error { color: #ef4444; font-size: 13px; margin-top: 12px; text-align: center; display: none; }
  .footer { text-align: center; margin-top: 24px; color: #525252; font-size: 12px; }
  #dashboard-frame { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 9999; }
  .logout-btn { position: fixed; top: 12px; right: 12px; z-index: 10000; background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #333; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; display: none; }
  .logout-btn:hover { background: rgba(239,68,68,0.8); }
</style>
</head>
<body>

<div class="login-container" id="loginBox">
  <div class="logo">
    <h1>📊 KI-Kurs Dashboard</h1>
    <p>Internes Dashboard — Zugang nur mit Berechtigung</p>
  </div>
  <form onsubmit="return doLogin()">
    <div class="form-group">
      <label>E-Mail</label>
      <input type="email" id="email" placeholder="name@company.de" required autocomplete="email">
    </div>
    <div class="form-group">
      <label>Passwort</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn">Anmelden</button>
    <div class="error" id="error">Ungültige Zugangsdaten. Bitte versuche es erneut.</div>
  </form>
  <div class="footer">Förderperspektive × Pro Med Performance</div>
</div>

<iframe id="dashboard-frame" src=""></iframe>
<button class="logout-btn" id="logoutBtn" onclick="doLogout()">Logout</button>

<script>
const VALID = {
  "ad73dd25199902ab2064db50eebed49a57a527c1bbdd4a38f920e2dae1409463": 1,
  "1447a1a732af20cbac4cae9b3bfd3a974f58b796c0c77b7f6d2b60f412eee316": 1,
  "ca4ca53437307bab3b2a44256ac20aab74a3c4112d1ccb242f97b61b8f9b2ca2": 1,
  "f64980962c7adcc2314c7eaebeb68cb020da77c506db25df6f937d013af3509d": 1,
  "f6d52a1e98e2c92b5695f9ef4b6881b260b73e830e147b96d6183d0b74620962": 1
};

async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doLogin() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pw = document.getElementById('password').value;
  const hash = await sha256(email + ':' + pw);
  
  if (VALID[hash]) {
    sessionStorage.setItem('auth', hash);
    showDashboard();
  } else {
    document.getElementById('error').style.display = 'block';
  }
  return false;
}

function showDashboard() {
  document.getElementById('loginBox').style.display = 'none';
  const frame = document.getElementById('dashboard-frame');
  frame.src = 'dashboard.html';
  frame.style.display = 'block';
  document.getElementById('logoutBtn').style.display = 'block';
}

function doLogout() {
  sessionStorage.removeItem('auth');
  location.reload();
}

// Auto-login if session exists
(async () => {
  const auth = sessionStorage.getItem('auth');
  if (auth && VALID[auth]) showDashboard();
})();
</script>

</body>
</html>
